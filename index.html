<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stuur me iets</title>
<style>
  :root{
    --bg:#0a0d10;
    --panel:#11161b;
    --line:#1f2730;
    --text:#d8e2e8;
    --dim:#5d6b75;
    --accent:#39ff88;
    --accent-dim:#1f9a52;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:"JetBrains Mono","Fira Code",ui-monospace,Consolas,monospace;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .crt{
    position:fixed; inset:0; pointer-events:none; opacity:.04;
    background:repeating-linear-gradient(0deg,#fff 0px,#fff 1px,transparent 1px,transparent 3px);
  }
  .card{
    width:100%;
    max-width:480px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:28px;
    box-shadow:0 0 0 1px rgba(57,255,136,.04), 0 20px 60px -20px rgba(0,0,0,.6);
  }
  .prompt{
    color:var(--accent);
    font-size:13px;
    letter-spacing:.04em;
    margin:0 0 4px;
  }
  h1{
    font-size:19px;
    font-weight:600;
    margin:0 0 6px;
    color:var(--text);
  }
  .sub{
    color:var(--dim);
    font-size:13px;
    margin:0 0 20px;
    line-height:1.5;
  }
  textarea{
    width:100%;
    min-height:120px;
    resize:vertical;
    background:#0d1216;
    border:1px solid var(--line);
    border-radius:6px;
    color:var(--text);
    font-family:inherit;
    font-size:14px;
    padding:14px;
    outline:none;
    transition:border-color .15s;
  }
  textarea:focus{border-color:var(--accent-dim);}
  textarea::placeholder{color:var(--dim);}
  .row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top:14px;
    gap:12px;
  }
  .count{color:var(--dim); font-size:12px;}
  button{
    appearance:none;
    border:1px solid var(--accent-dim);
    background:transparent;
    color:var(--accent);
    font-family:inherit;
    font-size:13px;
    font-weight:600;
    letter-spacing:.03em;
    padding:10px 18px;
    border-radius:6px;
    cursor:pointer;
    transition:background .15s, color .15s;
  }
  button:hover:not(:disabled){background:var(--accent); color:#06140c;}
  button:disabled{opacity:.4; cursor:default;}
  .status{
    margin-top:14px;
    font-size:12px;
    min-height:16px;
    color:var(--dim);
  }
  .status.ok{color:var(--accent);}
  .status.err{color:#ff5c5c;}
</style>
</head>
<body>
  <div class="crt"></div>
  <div class="card">
    <p class="prompt">&gt; anonieme_inbox</p>
    <h1>Stuur me iets</h1>
    <p class="sub">Wat je hier typt komt direct als pushmelding op mijn telefoon terecht. Geen account, geen log, geen IP-opslag op deze pagina.</p>
    <textarea id="msg" maxlength="800" placeholder="Typ hier je bericht..."></textarea>
    <div class="row">
      <span class="count" id="count">0 / 800</span>
      <button id="sendBtn">Versturen →</button>
    </div>
    <p class="status" id="status"></p>
  </div>

<script>
  // === CONFIG ===
  // Verander dit naar je eigen geheime topic-naam (zie uitleg in het antwoord).
  // Hoe random/onraadbaarder, hoe anoniemer/privater de inbox.
  const NTFY_TOPIC = "ping_kulderzipke";
  const NTFY_URL = `https://ntfy.sh/${NTFY_TOPIC}`;

  const textarea = document.getElementById("msg");
  const counter  = document.getElementById("count");
  const button   = document.getElementById("sendBtn");
  const status   = document.getElementById("status");

  textarea.addEventListener("input", () => {
    counter.textContent = `${textarea.value.length} / 800`;
  });

  button.addEventListener("click", async () => {
    const message = textarea.value.trim();
    if (!message) {
      setStatus("Typ eerst iets in.", "err");
      return;
    }

    button.disabled = true;
    setStatus("Versturen...", "");

    try {
      const res = await fetch(NTFY_URL, {
        method: "POST",
        body: message,
        headers: {
          "Title": "Nieuw anoniem bericht",
          "Tags": "speech_balloon"
        }
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      textarea.value = "";
      counter.textContent = "0 / 800";
      setStatus("Verstuurd ✓", "ok");
    } catch (err) {
      setStatus("Mislukt, probeer opnieuw.", "err");
    } finally {
      button.disabled = false;
    }
  });

  function setStatus(text, kind) {
    status.textContent = text;
    status.className = "status" + (kind ? " " + kind : "");
  }
</script>
</body>
</html>
